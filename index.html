<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VELORA FASHION – Trendy Clothes for Women & Men | Shop Now</title>
  <meta name="description" content="Shop the latest women's & men's fashion at VELORA FASHION. Explore trendy tops, dresses, kurtas & more. Free shipping on orders above ₹999." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --cream: #F7F3EE; --sand: #E8DDD0; --charcoal: #1C1A18; --muted: #6B6560;
      --accent: #C4924A; --accent-light: #E8C48A; --white: #FFFFFF;
      --font-display: 'Cormorant Garamond', serif; --font-body: 'DM Sans', sans-serif;
      --success: #2E7D32; --error: #C62828;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--cream); color: var(--charcoal); font-family: var(--font-body); font-weight: 300; overflow-x: hidden; }

    /* ── ANNOUNCEMENT BAR ── */
    .announcement { background: var(--charcoal); color: var(--accent-light); text-align: center; padding: 10px 20px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }

    /* ── NAVBAR ── */
    nav { position: sticky; top: 0; z-index: 999; background: var(--cream); border-bottom: 1px solid var(--sand); padding: 0 48px; display: flex; align-items: center; justify-content: space-between; height: 72px; backdrop-filter: blur(10px); }
    .nav-logo { font-family: var(--font-display); font-size: 28px; font-weight: 600; letter-spacing: 6px; color: var(--charcoal); text-decoration: none; text-transform: uppercase; }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a { font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--charcoal); text-decoration: none; position: relative; padding-bottom: 2px; transition: color 0.3s; }
    .nav-links a::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 1px; background: var(--accent); transition: width 0.3s ease; }
    .nav-links a:hover { color: var(--accent); }
    .nav-links a:hover::after { width: 100%; }
    .nav-icons { display: flex; gap: 20px; align-items: center; }
    .nav-icons button { background: none; border: none; cursor: pointer; font-size: 18px; color: var(--charcoal); transition: color 0.3s; position: relative; }
    .nav-icons button:hover { color: var(--accent); }
    .cart-badge { position: absolute; top: -6px; right: -6px; background: var(--accent); color: white; border-radius: 50%; width: 16px; height: 16px; font-size: 9px; display: flex; align-items: center; justify-content: center; }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; }
    .hamburger span { width: 22px; height: 1.5px; background: var(--charcoal); display: block; }

    /* ── HERO ── */
    .hero { display: grid; grid-template-columns: 1fr 1fr; min-height: 90vh; overflow: hidden; }
    .hero-left { display: flex; flex-direction: column; justify-content: center; padding: 80px 72px; position: relative; animation: fadeInLeft 1s ease forwards; }
    .hero-left::before { content: 'VELORA'; position: absolute; top: 50%; left: -40px; transform: translateY(-50%) rotate(-90deg); font-family: var(--font-display); font-size: 180px; font-weight: 300; color: rgba(196,146,74,0.05); letter-spacing: 20px; pointer-events: none; white-space: nowrap; }
    .hero-tag { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
    .hero-tag::before { content: ''; width: 40px; height: 1px; background: var(--accent); }
    .hero h1 { font-family: var(--font-display); font-size: clamp(52px, 6vw, 88px); font-weight: 300; line-height: 1.05; color: var(--charcoal); margin-bottom: 28px; }
    .hero h1 em { font-style: italic; color: var(--accent); }
    .hero p { font-size: 14px; line-height: 1.8; color: var(--muted); max-width: 380px; margin-bottom: 44px; }
    .hero-btns { display: flex; gap: 16px; flex-wrap: wrap; }
    .hero-right { position: relative; overflow: hidden; animation: fadeInRight 1s ease forwards; }
    .hero-right img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 6s ease; }
    .hero-right:hover img { transform: scale(1.05); }
    .hero-overlay { position: absolute; bottom: 40px; right: 40px; background: var(--cream); padding: 20px 24px; animation: floatUp 2s ease 1s both; }
    .hero-overlay p { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .hero-overlay strong { font-family: var(--font-display); font-size: 20px; font-weight: 400; color: var(--charcoal); }

    /* ── BUTTONS ── */
    .btn-primary { background: var(--charcoal); color: var(--cream); border: none; padding: 16px 40px; font-family: var(--font-body); font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; cursor: pointer; text-decoration: none; display: inline-block; transition: all 0.3s ease; }
    .btn-primary:hover { background: var(--accent); transform: translateY(-2px); }
    .btn-outline { background: transparent; color: var(--charcoal); border: 1px solid var(--charcoal); padding: 15px 40px; font-family: var(--font-body); font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; cursor: pointer; text-decoration: none; display: inline-block; transition: all 0.3s ease; }
    .btn-outline:hover { background: var(--charcoal); color: var(--cream); }

    /* ── TICKER ── */
    .ticker-wrap { background: var(--charcoal); padding: 14px 0; overflow: hidden; }
    .ticker { display: flex; gap: 60px; animation: ticker 20s linear infinite; white-space: nowrap; }
    .ticker span { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent-light); flex-shrink: 0; }
    .ticker span::before { content: '✦'; margin-right: 24px; color: var(--accent); }

    /* ── CATEGORIES ── */
    .categories { padding: 100px 48px; }
    .section-header { text-align: center; margin-bottom: 64px; }
    .section-tag { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
    .section-title { font-family: var(--font-display); font-size: clamp(36px, 4vw, 56px); font-weight: 300; color: var(--charcoal); line-height: 1.1; }
    .section-title em { font-style: italic; color: var(--accent); }
    .cat-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 16px; max-width: 1280px; margin: 0 auto; }
    .cat-card { position: relative; overflow: hidden; cursor: pointer; aspect-ratio: 3/4; }
    .cat-card:first-child { aspect-ratio: auto; }
    .cat-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.7s ease; display: block; }
    .cat-card:hover img { transform: scale(1.06); }
    .cat-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 40px 28px 28px; background: linear-gradient(transparent, rgba(28,26,24,0.75)); transform: translateY(10px); transition: transform 0.4s ease; }
    .cat-card:hover .cat-info { transform: translateY(0); }
    .cat-info h3 { font-family: var(--font-display); font-size: 28px; font-weight: 400; color: white; letter-spacing: 1px; }
    .cat-info p { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent-light); margin-top: 4px; }
    .cat-arrow { position: absolute; top: 24px; right: 24px; width: 40px; height: 40px; background: var(--cream); display: flex; align-items: center; justify-content: center; font-size: 16px; opacity: 0; transform: translateY(-8px); transition: all 0.4s ease; }
    .cat-card:hover .cat-arrow { opacity: 1; transform: translateY(0); }

    /* ── PRODUCTS ── */
    .products { padding: 100px 48px; background: var(--white); }
    .products-tabs { display: flex; justify-content: center; gap: 0; margin-bottom: 56px; }
    .tab-btn { padding: 12px 32px; font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; background: none; border: 1px solid var(--sand); cursor: pointer; color: var(--muted); transition: all 0.3s; font-family: var(--font-body); }
    .tab-btn.active, .tab-btn:hover { background: var(--charcoal); color: var(--cream); border-color: var(--charcoal); }
    .product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; max-width: 1280px; margin: 0 auto; }
    .product-card { cursor: pointer; animation: fadeInUp 0.6s ease both; }
    .product-img { position: relative; overflow: hidden; aspect-ratio: 3/4; background: var(--sand); margin-bottom: 16px; }
    .product-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
    .product-card:hover .product-img img { transform: scale(1.06); }
    .product-badge { position: absolute; top: 16px; left: 16px; background: var(--charcoal); color: var(--cream); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; padding: 5px 10px; }
    .product-badge.sale { background: var(--accent); }
    .product-actions { position: absolute; bottom: 16px; left: 16px; right: 16px; display: flex; gap: 8px; transform: translateY(16px); opacity: 0; transition: all 0.4s ease; }
    .product-card:hover .product-actions { transform: translateY(0); opacity: 1; }
    .btn-cart { flex: 1; background: var(--charcoal); color: white; border: none; padding: 12px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: var(--font-body); transition: background 0.3s; }
    .btn-cart:hover { background: var(--accent); }
    .btn-wish { width: 40px; background: var(--cream); border: none; cursor: pointer; font-size: 16px; transition: background 0.3s; }
    .product-name { font-family: var(--font-display); font-size: 17px; font-weight: 400; color: var(--charcoal); margin-bottom: 4px; }
    .product-cat { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .product-price { display: flex; gap: 10px; align-items: center; }
    .price-current { font-size: 16px; font-weight: 500; color: var(--charcoal); }
    .price-old { font-size: 13px; color: var(--muted); text-decoration: line-through; }
    .price-off { font-size: 10px; color: var(--accent); letter-spacing: 1px; }

    /* ── BANNER ── */
    .banner { display: grid; grid-template-columns: 1fr 1fr; min-height: 480px; }
    .banner-img { position: relative; overflow: hidden; }
    .banner-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s ease; }
    .banner-img:hover img { transform: scale(1.04); }
    .banner-content { background: var(--charcoal); display: flex; flex-direction: column; justify-content: center; padding: 72px 80px; }
    .banner-content .section-tag { color: var(--accent-light); margin-bottom: 16px; }
    .banner-content h2 { font-family: var(--font-display); font-size: clamp(36px, 4vw, 60px); font-weight: 300; color: var(--cream); line-height: 1.1; margin-bottom: 20px; }
    .banner-content h2 em { font-style: italic; color: var(--accent-light); }
    .banner-content p { font-size: 14px; line-height: 1.8; color: rgba(247,243,238,0.65); max-width: 380px; margin-bottom: 40px; }

    /* ── FEATURES ── */
    .features { padding: 72px 48px; background: var(--sand); }
    .features-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; max-width: 1280px; margin: 0 auto; }
    .feature-item { text-align: center; padding: 40px 24px; background: var(--cream); transition: transform 0.3s ease; }
    .feature-item:hover { transform: translateY(-6px); }
    .feature-icon { font-size: 32px; margin-bottom: 16px; }
    .feature-item h4 { font-family: var(--font-display); font-size: 18px; font-weight: 400; margin-bottom: 8px; color: var(--charcoal); }
    .feature-item p { font-size: 12px; line-height: 1.7; color: var(--muted); }

    /* ── TESTIMONIALS ── */
    .testimonials { padding: 100px 48px; background: var(--white); }
    .testi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; max-width: 1100px; margin: 0 auto; }
    .testi-card { padding: 40px 36px; border: 1px solid var(--sand); position: relative; }
    .testi-quote { font-size: 60px; font-family: var(--font-display); line-height: 0.6; color: var(--accent); margin-bottom: 20px; display: block; }
    .testi-card p { font-family: var(--font-display); font-size: 17px; font-style: italic; line-height: 1.7; color: var(--charcoal); margin-bottom: 20px; }
    .testi-author { display: flex; align-items: center; gap: 12px; }
    .testi-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--sand); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 16px; color: var(--accent); }
    .testi-name { font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--charcoal); font-weight: 500; }
    .testi-stars { font-size: 11px; color: var(--accent); }

    /* ── NEWSLETTER ── */
    .newsletter { padding: 100px 48px; background: var(--charcoal); text-align: center; }
    .newsletter h2 { font-family: var(--font-display); font-size: clamp(36px, 5vw, 64px); font-weight: 300; color: var(--cream); margin-bottom: 16px; }
    .newsletter h2 em { font-style: italic; color: var(--accent-light); }
    .newsletter p { font-size: 14px; color: rgba(247,243,238,0.6); margin-bottom: 40px; }
    .newsletter-form { display: flex; gap: 0; max-width: 480px; margin: 0 auto; }
    .newsletter-form input { flex: 1; padding: 16px 24px; border: 1px solid rgba(247,243,238,0.2); background: rgba(255,255,255,0.05); color: var(--cream); font-family: var(--font-body); font-size: 13px; outline: none; }
    .newsletter-form input::placeholder { color: rgba(247,243,238,0.35); }
    .newsletter-form button { padding: 16px 32px; background: var(--accent); color: white; border: none; font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; cursor: pointer; font-family: var(--font-body); transition: background 0.3s; }
    .newsletter-form button:hover { background: var(--accent-light); color: var(--charcoal); }

    /* ── FOOTER ── */
    footer { background: #141210; color: rgba(247,243,238,0.6); padding: 72px 48px 32px; }
    .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 48px; max-width: 1280px; margin: 0 auto 48px; }
    .footer-brand .nav-logo { color: var(--cream); display: block; margin-bottom: 16px; font-size: 22px; }
    .footer-brand p { font-size: 13px; line-height: 1.8; max-width: 280px; margin-bottom: 24px; }
    .social-links { display: flex; gap: 12px; }
    .social-links a { width: 36px; height: 36px; border: 1px solid rgba(247,243,238,0.2); display: flex; align-items: center; justify-content: center; color: rgba(247,243,238,0.6); text-decoration: none; font-size: 14px; transition: all 0.3s; }
    .social-links a:hover { border-color: var(--accent); color: var(--accent); }
    .footer-col h5 { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--cream); margin-bottom: 20px; }
    .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .footer-col ul a { color: rgba(247,243,238,0.5); text-decoration: none; font-size: 13px; transition: color 0.3s; }
    .footer-col ul a:hover { color: var(--accent-light); }
    .footer-bottom { border-top: 1px solid rgba(247,243,238,0.08); padding-top: 28px; display: flex; justify-content: space-between; align-items: center; max-width: 1280px; margin: 0 auto; font-size: 11px; letter-spacing: 1px; }

    /* ── CART DRAWER ── */
    .cart-overlay { position: fixed; inset: 0; background: rgba(28,26,24,0.5); z-index: 1998; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
    .cart-overlay.open { opacity: 1; pointer-events: all; }
    .cart-drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 400px; background: var(--cream); z-index: 1999; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.16,1,0.3,1); display: flex; flex-direction: column; }
    .cart-drawer.open { transform: translateX(0); }
    .cart-header { padding: 28px 32px; border-bottom: 1px solid var(--sand); display: flex; justify-content: space-between; align-items: center; }
    .cart-header h3 { font-family: var(--font-display); font-size: 22px; font-weight: 400; }
    .cart-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); }
    .cart-body { flex: 1; overflow-y: auto; padding: 24px 32px; }
    .cart-empty { text-align: center; padding: 60px 0; color: var(--muted); }
    .cart-empty p { margin-top: 12px; font-size: 14px; }
    .cart-item { display: flex; gap: 16px; padding: 20px 0; border-bottom: 1px solid var(--sand); }
    .cart-item-img { width: 80px; height: 100px; object-fit: cover; background: var(--sand); }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-family: var(--font-display); font-size: 16px; margin-bottom: 4px; }
    .cart-item-price { font-size: 14px; color: var(--accent); margin-bottom: 12px; }
    .cart-item-qty { display: flex; align-items: center; gap: 12px; }
    .qty-btn { width: 28px; height: 28px; border: 1px solid var(--sand); background: none; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .qty-btn:hover { background: var(--charcoal); color: white; border-color: var(--charcoal); }
    .cart-footer { padding: 24px 32px; border-top: 1px solid var(--sand); }
    .cart-total { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; font-size: 14px; }
    .cart-total span:last-child { font-family: var(--font-display); font-size: 22px; }

    /* ── MODAL BASE ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(28,26,24,0.7); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--cream); width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; padding: 48px; position: relative; animation: modalIn 0.3s ease; }
    .modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--muted); }
    .modal h2 { font-family: var(--font-display); font-size: 32px; font-weight: 300; margin-bottom: 8px; }
    .modal .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 32px; }

    /* ── FORM STYLES ── */
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
